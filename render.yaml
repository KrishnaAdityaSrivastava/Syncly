services:
  - type: web
    name: syncly-api
    runtime: node
    rootDir: Backend
    plan: free
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5500
      - key: CLIENT_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: DB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRE
        value: 7d
      - key: INVITE_SECRET
        sync: false
      - key: COOKIE_SAME_SITE
        value: none
      - key: EMAIL_PASSWORD
        sync: false
      - key: ARCJET_KEY
        sync: false
      - key: ARCJET_ENV
        sync: false
